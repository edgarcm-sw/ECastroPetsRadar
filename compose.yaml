services: 
  postgres:
    image: postgis/postgis:16-master
    container_name: PostgresDB
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data_db:/var/lib/postgresql

  redis:                          
    image: redis:7-alpine
    container_name: RedisDB
    ports:
      - 6379:6379

volumes:
  postgres_data_db: